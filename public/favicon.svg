<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="120" fill="#050505"/>
  
  <g filter="url(#glow)">
    <!-- Base of the A -->
    <path d="M 160 380 L 256 140 L 352 380" stroke="#CCFF00" stroke-width="60" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Crossbar -->
    <path d="M 195 280 L 317 280" stroke="#CCFF00" stroke-width="60" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Define the neon glow filter -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
</svg>
